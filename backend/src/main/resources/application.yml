server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: product-management-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
    username: ${DB_USERNAME:ecommerce}
    password: ${DB_PASSWORD:ecommerce}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
