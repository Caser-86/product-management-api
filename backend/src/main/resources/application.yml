server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: product-management-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
    username: ${DB_USERNAME:ecommerce}
    password: ${DB_PASSWORD:ecommerce}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  auth:
    jwt:
      issuer: ${APP_AUTH_JWT_ISSUER:product-management-api}
      secret: ${APP_AUTH_JWT_SECRET:change-me-for-local-development-only}
      access-token-ttl-minutes: ${APP_AUTH_JWT_ACCESS_TOKEN_TTL_MINUTES:60}
    users:
      - username: platform-admin
        password: platform-secret
        user-id: 9001
        role: PLATFORM_ADMIN
        merchant-id: 2001
      - username: merchant-admin
        password: merchant-secret
        user-id: 9002
        role: MERCHANT_ADMIN
        merchant-id: 2001
